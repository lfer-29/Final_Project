<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker - Manage Your Expenses</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <div id="toast" class="toast hidden"></div>

    <div id="auth-view" class="view">
        <div class="auth-container glass">
            <h2>Welcome</h2>
            <p>Sign in to manage your expenses</p>
            <form id="auth-form">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" id="auth-submit">Login</button>
            </form>
            <p class="toggle-auth">Don't have an account? <span id="toggle-auth-btn">Register</span></p>
        </div>
    </div>

    <div id="dashboard-view" class="view hidden">
        <nav class="navbar glass">
            <div class="logo">Tracker</div>
            <div class="user-info">
                <span id="nav-username">User</span>
                <button id="logout-btn" class="btn-secondary">Logout</button>
            </div>
        </nav>

        <main class="dashboard-content">
            <!-- Sidebar for Sheets -->
            <aside class="sidebar glass">
                <div class="sidebar-header">
                    <h3>My Sheets</h3>
                    <button id="new-sheet-btn" class="btn-icon" title="New Sheet">+</button>
                </div>
                <div id="sheets-list">
                    <!-- Sheets injected via JS -->
                </div>
            </aside>

            <!-- Main area for Expenses -->
            <section class="main-area glass hidden" id="expenses-area">
                <div class="area-header">
                    <h2 id="current-sheet-title">Sheet Title</h2>
                    <div class="header-actions">
                        <button id="delete-sheet-btn" class="btn-danger">Delete Sheet</button>
                        <button id="add-expense-btn" class="btn-primary">Add Expense</button>
                    </div>
                </div>
                <div class="expenses-container">
                    <div class="expenses-summary">
                        <div class="summary-card">
                            <span>Total</span>
                            <h3 id="total-amount">$0.00</h3>
                        </div>
                    </div>
                    <div class="table-container">
                        <table class="expenses-table">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Description</th>
                                    <th>Category</th>
                                    <th>Amount</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="expenses-list">
                                <!-- Expenses injected via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
            
            <div id="no-sheet-selected" class="empty-state">
                <p>Select a sheet from the sidebar or create a new one to start.</p>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="sheet-modal" class="modal hidden">
        <div class="modal-content glass">
            <h3>New Sheet</h3>
            <form id="sheet-form">
                <input type="text" id="sheet-title" placeholder="e.g. June 2026 Trip" required>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary close-modal">Cancel</button>
                    <button type="submit" class="btn-primary">Create</button>
                </div>
            </form>
        </div>
    </div>

    <div id="expense-modal" class="modal hidden">
        <div class="modal-content glass">
            <h3 id="expense-modal-title">Add Expense</h3>
            <form id="expense-form">
                <input type="hidden" id="expense-id">
                <input type="date" id="expense-date" required>
                <input type="text" id="expense-desc" placeholder="Description" required>
                <input type="text" id="expense-category" placeholder="Category" required>
                <input type="number" id="expense-amount" placeholder="Amount" step="0.01" required>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary close-modal">Cancel</button>
                    <button type="submit" class="btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <div id="confirm-modal" class="modal hidden">
        <div class="modal-content glass" style="text-align: center;">
            <h3 id="confirm-title">Are you sure?</h3>
            <p id="confirm-message" style="margin-bottom: 20px; color: var(--text-muted);"></p>
            <div class="modal-actions" style="justify-content: center;">
                <button type="button" class="btn-secondary" id="confirm-cancel">Cancel</button>
                <button type="button" class="btn-danger" id="confirm-ok">Delete</button>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
